name: Feature request
description: Propose a new capability or a meaningful improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for intentional behavior changes or new capabilities.
        For confirmed breakage, use the Bug report form instead.
  - type: textarea
    id: problem
    attributes:
      label: Problem or limitation
      description: What user pain, limitation, or investigation outcome motivates this?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior you want, not just the implementation.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or examples
      description: Link saves, logs, screenshots, issue numbers, or prior investigations if available.
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and non-goals
      description: Note compatibility concerns, save impact, or what the change should explicitly avoid.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - phantom-vacancy
        - software-track
        - diagnostics
        - optimization
        - repo-meta
    validations:
      required: true
